<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illinois Center Hub</title>
<style>
  :root {
    --navy: #1B3A6B;
    --navy-dark: #16233D;
    --red: #E0402C;
    --tan: #A88F63;
    --cream: #F7F5F1;
    --rule: #D8CFC0;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      linear-gradient(180deg, var(--cream) 0%, #EFEAE1 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--navy-dark);
    padding: 32px 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #FFFFFF;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 48px 36px 40px;
    text-align: center;
    box-shadow: 0 1px 2px rgba(27, 42, 65, 0.04);
  }

  .logo {
    width: 220px;
    max-width: 80%;
    height: auto;
    margin: 0 auto 32px;
    display: block;
  }

  .stripe {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
  }
  .stripe span {
    width: 28px;
    height: 4px;
    border-radius: 2px;
  }
  .stripe span:nth-child(1) { background: var(--navy); }
  .stripe span:nth-child(2) { background: var(--red); }
  .stripe span:nth-child(3) { background: var(--tan); }

  h1 {
    font-size: 24px;
    letter-spacing: 0.02em;
    margin: 0 0 10px;
    font-weight: 700;
    color: var(--navy-dark);
  }

  p.sub {
    margin: 0 0 32px;
    font-size: 15px;
    line-height: 1.5;
    color: #5B6472;
  }

  .stores {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .store-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 18px;
    border-radius: 8px;
    background: var(--navy-dark);
    color: #fff;
    text-decoration: none;
    transition: background 0.15s ease, transform 0.1s ease;
    text-align: left;
  }

  .store-link:hover {
    background: var(--navy);
  }

  .store-link:active {
    transform: scale(0.99);
  }

  .store-link svg {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
  }

  .store-text {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }

  .store-text .eyebrow {
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    opacity: 0.75;
  }

  .store-text .name {
    font-size: 16.5px;
    font-weight: 600;
  }

  footer {
    margin-top: 32px;
    font-size: 12.5px;
    color: #9AA0A8;
  }

  @media (max-width: 480px) {
    .card { padding: 40px 24px 32px; }
  }
</style>
</head>

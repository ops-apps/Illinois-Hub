<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illinois Hub</title>
<style>
  :root {
    color-scheme: light;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f4f5f7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    box-sizing: border-box;
  }
  .card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 8px;
    color: #1a1a1a;
  }
  p.subtitle {
    color: #666;
    margin: 0 0 32px;
    font-size: 15px;
  }
  a.link-button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    background: #1a1a1a;
    color: #ffffff;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    transition: opacity 0.15s ease;
  }
  a.link-button:last-of-type {
    margin-bottom: 0;
  }
  a.link-button:hover {
    opacity: 0.85;
  }
  a.link-button svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Illinois Hub</h1>
    <p class="subtitle">Download the app for your device</p>

    <a class="link-button" href="https://play.google.com/store/apps/details?id=com.illinoiscenter.app">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 2.4c-.3.3-.5.7-.5 1.2v16.8c0 .5.2.9.5 1.2l.1.1L13 12.5v-.1L3.7 2.3l-.1.1z"/><path d="M16.1 15.6l-3.1-3.1v-.1l3.1-3.1 3.5 2c1 .6 1 1.5 0 2.1l-3.5 2.2z"/><path d="M13 12.4l-9.4 9.4c.4.4 1 .4 1.7.1l10.9-6.2-3.2-3.3z"/><path d="M13 11.6l3.2-3.2-10.9-6.2c-.7-.4-1.3-.3-1.7.1L13 11.6z"/></svg>
      Google Play Store
    </a>

    <a class="link-button" href="https://apps.apple.com/us/app/illinois-center-hub/id6773822598">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.53-3.24 0-1.44.66-2.21.47-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
      Apple App Store
    </a>
  </div>
</body>
</html>
